; PlatformIO Project Configuration
; Target: Seeed reTerminal E1002 (ESP32-S3)
; Framework: Arduino
; Display: Spectra 6 ePaper via Seeed reTerminal E10xx driver
;
; Build envs:
;   pio run -e gol           # Game of Life (bicolor)
;   pio run -e sandpile      # Abelian sandpile (Spectra 6 color)

[common]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
lib_deps =
    https://github.com/Seeed-Studio/Seeed_GFX.git
monitor_speed = 115200
upload_speed = 460800
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_8MB.csv
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -DDISP_W=800
    -DDISP_H=480
    -DEPAPER_ENABLE
    -DBOARD_SCREEN_COMBO=521

[env:gol]
extends = common
build_flags =
    ${common.build_flags}
    -DSIM_GOL
    -DGOL_W=200
    -DGOL_H=120

[env:sandpile]
extends = common
build_flags =
    ${common.build_flags}
    -DGRID_W=120
    -DGRID_H=72
